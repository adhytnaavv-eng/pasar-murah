<!DOCTYPE html>

<html>
<head>
  <title>Scan Distribusi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #f2f2f2;
    }

    h2 {
      text-align: center;
    }

    button {
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      width: 100%;
      margin-top: 10px;
    }

    .btn-scan {
      background: #007bff;
      color: white;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .komoditi-btn {
      margin-top: 8px;
      background: #28a745;
      color: white;
    }

    .disabled {
      background: #ccc;
    }

    select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      margin-top: 10px;
    }

    #reader {
      width: 100%;
      margin-top: 10px;
    }
  </style>

</head>

<body>

<h2>📦 Scan Distribusi</h2>

<button class="btn-scan" onclick="startScan()">▶️ Mulai Scan</button>

<div id="reader"></div>

<div class="card">
  <h3 id="info">Belum scan</h3>
</div>

<div class="card">
  <h3>🛒 Pilih Komoditi</h3>
  <div id="komoditiButtons"></div>
</div>

<div class="card">
  <h3>🏢 Distributor</h3>
  <select id="distributor">
    <option value="">Pilih Distributor</option>
  </select>
</div>

<button onclick="simpan()" style="background:#ff9800;color:white;">
  💾 Simpan Distribusi
</button>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    doc, 
    getDoc, 
    updateDoc, 
    addDoc, 
    collection, 
    getDocs 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let userId = "";
  let komoditiList = [];
  let selectedItem = "";
  let scanner;

  async function loadDistributor() {
    const snapshot = await getDocs(collection(db, "master_distributor"));
    const select = document.getElementById("distributor");

    snapshot.forEach(docSnap => {
      const nama = docSnap.data().nama;

      const option = document.createElement("option");
      option.value = nama;
      option.text = nama;

      select.appendChild(option);
    });
  }

  loadDistributor();

  function renderButtons(dataKupon) {
    const container = document.getElementById("komoditiButtons");
    container.innerHTML = "";

    komoditiList.forEach(item => {
      const btn = document.createElement("button");
      btn.innerText = item;
      btn.className = "komoditi-btn";

      if (dataKupon[item] === true) {
        btn.disabled = true;
        btn.classList.add("disabled");
      }

      btn.onclick = () => {
        selectedItem = item;
        alert("Dipilih: " + item);
      };

      container.appendChild(btn);
    });
  }

  async function loadData() {
    const snap = await getDoc(doc(db, "kupon", userId));

    if (snap.exists()) {
      renderButtons(snap.data());
    }
  }

  function onScanSuccess(decodedText) {
    scanner.stop();

    const parts = decodedText.split("|");
    userId = parts[0];
    komoditiList = parts[1].split(",");

    document.getElementById("info").innerText = "ID: " + userId;

    loadData();
  }

  window.startScan = function() {
    scanner = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {
      let backCamera = devices.find(d =>
        d.label.toLowerCase().includes("back") ||
        d.label.toLowerCase().includes("rear")
      );

      let cameraId = backCamera ? backCamera.id : devices[0].id;

      scanner.start(
        cameraId,
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );
    });
  }

  window.simpan = async function() {
    if (!selectedItem) {
      alert("Pilih komoditi dulu!");
      return;
    }

    const distributor = document.getElementById("distributor").value;

    if (!distributor) {
      alert("Pilih distributor!");
      return;
    }

    await updateDoc(doc(db, "kupon", userId), {
      [selectedItem]: true
    });

    await addDoc(collection(db, "distribusi"), {
      id_user: userId,
      komoditi: selectedItem,
      distributor: distributor,
      waktu: new Date()
    });

    alert("✅ Berhasil: " + selectedItem);

    selectedItem = "";
    loadData();
  }
</script>

</body>
</html>
