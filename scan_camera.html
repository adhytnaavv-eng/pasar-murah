<!DOCTYPE html>
<html>
<head>
  <title>Scan Distribusi</title>
</head>
<body>

<h2>Scan QR (Petugas 3)</h2>

<button onclick="startScan()">▶️ Mulai Scan</button>

<br><br>

<div id="reader" style="width:300px;"></div>

<h3 id="info"></h3>

<h4>Pilih Komoditi:</h4>
<div id="komoditiButtons"></div>

<br>

<h4>Pilih Distributor:</h4>
<select id="distributor">
  <option value="">Pilih Distributor</option>
</select>

<br><br>

<button onclick="simpan()">Simpan</button>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    doc, 
    getDoc, 
    updateDoc, 
    addDoc, 
    collection, 
    getDocs 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let userId = "";
  let komoditiList = [];
  let selectedItems = [];
  let scanner;

  // 🔥 LOAD DISTRIBUTOR DINAMIS
  async function loadDistributor() {
    const snapshot = await getDocs(collection(db, "master_distributor"));
    const select = document.getElementById("distributor");

    select.innerHTML = '<option value="">Pilih Distributor</option>';

    snapshot.forEach(docSnap => {
      const nama = docSnap.data().nama;

      const option = document.createElement("option");
      option.value = nama;
      option.text = nama;

      select.appendChild(option);
    });
  }

  loadDistributor();

  // 🔥 TAMPILKAN CHECKBOX KOMODITI
  function renderButtons(dataKupon) {
    const container = document.getElementById("komoditiButtons");
    container.innerHTML = "";

    selectedItems = [];

    komoditiList.forEach(item => {
      const wrapper = document.createElement("div");

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.value = item;

      // disable jika sudah diambil
      if (dataKupon[item] === true) {
        checkbox.disabled = true;
      }

      checkbox.onchange = () => {
        if (checkbox.checked) {
          selectedItems.push(item);
        } else {
          selectedItems = selectedItems.filter(i => i !== item);
        }
      };

      const label = document.createElement("label");
      label.innerText = " " + item;

      wrapper.appendChild(checkbox);
      wrapper.appendChild(label);

      container.appendChild(wrapper);
    });
  }

  // 🔥 LOAD STATUS KUPON
  async function loadData() {
    const snap = await getDoc(doc(db, "kupon", userId));

    if (snap.exists()) {
      renderButtons(snap.data());
    }
  }

  // 🔥 HASIL SCAN
  function onScanSuccess(decodedText) {
    scanner.stop();

    const parts = decodedText.split("|");
    userId = parts[0];
    komoditiList = parts[1].split(",");

    document.getElementById("info").innerText = "ID: " + userId;

    loadData();
  }

  // 🔥 START SCAN
  window.startScan = function() {
    scanner = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
      .then(devices => {
        if (devices.length > 0) {

          let backCamera = devices.find(device =>
            device.label.toLowerCase().includes("back") ||
            device.label.toLowerCase().includes("rear")
          );

          let cameraId = backCamera ? backCamera.id : devices[0].id;

          scanner.start(
            cameraId,
            { fps: 10, qrbox: 250 },
            onScanSuccess
          );

        } else {
          alert("Kamera tidak ditemukan");
        }
      })
      .catch(err => {
        alert("Izin kamera ditolak / error: " + err);
        console.error(err);
      });
  }

  // 🔥 SIMPAN DISTRIBUSI (MULTI KOMODITI)
  window.simpan = async function() {
    if (selectedItems.length === 0) {
      alert("Pilih minimal 1 komoditi!");
      return;
    }

    const distributor = document.getElementById("distributor").value;

    if (!distributor) {
      alert("Pilih distributor!");
      return;
    }

    const ref = doc(db, "kupon", userId);

    for (let item of selectedItems) {

      await updateDoc(ref, {
        [item]: true
      });

      await addDoc(collection(db, "distribusi"), {
        id_user: userId,
        komoditi: item,
        distributor: distributor,
        waktu: new Date()
      });

    }

    alert("Berhasil diserahkan: " + selectedItems.join(", "));

    selectedItems = [];
    loadData();
  }
</script>

</body>
</html>
