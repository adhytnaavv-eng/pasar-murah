<!DOCTYPE html>

<html>
<head>
  <title>Scan Distribusi</title>
</head>
<body>

<h2>Scan QR (Petugas 3)</h2>

<div id="reader" style="width:300px;"></div>

<h3 id="info"></h3>

<div id="komoditiButtons"></div>

<br>

<select id="distributor">
  <option value="">Pilih Distributor</option>
  <option>Gudang A</option>
  <option>Gudang B</option>
  <option>Gudang C</option>
</select>

<br><br>

<button onclick="simpan()">Simpan</button>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let userId = "";
  let komoditiList = [];
  let selectedItem = "";

  function renderButtons(dataKupon) {
    const container = document.getElementById("komoditiButtons");
    container.innerHTML = "";

    komoditiList.forEach(item => {
      const btn = document.createElement("button");
      btn.innerText = item;

      if (dataKupon[item] === true) {
        btn.disabled = true;
      }

      btn.onclick = () => {
        selectedItem = item;
        alert("Pilih: " + item);
      };

      container.appendChild(btn);
      container.appendChild(document.createElement("br"));
    });
  }

  function onScanSuccess(decodedText) {
    const parts = decodedText.split("|");
    userId = parts[0];
    komoditiList = parts[1].split(",");

    document.getElementById("info").innerText = "ID: " + userId;

    loadData();
  }

  async function loadData() {
    const kuponRef = doc(db, "kupon", userId);
    const snap = await getDoc(kuponRef);

    if (snap.exists()) {
      renderButtons(snap.data());
    }
  }

  window.simpan = async function() {
    if (!selectedItem) {
      alert("Pilih komoditi dulu!");
      return;
    }

    const distributor = document.getElementById("distributor").value;

    if (!distributor) {
      alert("Pilih distributor!");
      return;
    }

    // update kupon
    await updateDoc(doc(db, "kupon", userId), {
      [selectedItem]: true
    });

    // simpan log distribusi
    await addDoc(collection(db, "distribusi"), {
      id_user: userId,
      komoditi: selectedItem,
      distributor: distributor,
      waktu: new Date()
    });

    alert("Berhasil diserahkan: " + selectedItem);

    selectedItem = "";
    loadData(); // refresh tombol
  }

  const html5QrCode = new Html5Qrcode("reader");
  Html5Qrcode.getCameras().then(devices => {
    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
  });
</script>

</body>
</html>
