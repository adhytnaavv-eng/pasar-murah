<!DOCTYPE html>

<html>
<head>
  <title>Scan Distribusi</title>
</head>
<body>

<h2>Scan QR (Petugas 3)</h2>

<button onclick="startScan()">▶️ Mulai Scan</button>

<br><br>

<div id="reader" style="width:300px;"></div>

<h3 id="info"></h3>

<div id="komoditiButtons"></div>

<br>

<select id="distributor">
  <option value="">Pilih Distributor</option>
  <option>Gudang A</option>
  <option>Gudang B</option>
  <option>Gudang C</option>
</select>

<br><br>

<button onclick="simpan()">Simpan</button>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let userId = "";
  let komoditiList = [];
  let selectedItem = "";
  let scanner;

  function renderButtons(dataKupon) {
    const container = document.getElementById("komoditiButtons");
    container.innerHTML = "";

    komoditiList.forEach(item => {
      const btn = document.createElement("button");
      btn.innerText = item;

      if (dataKupon[item] === true) {
        btn.disabled = true;
      }

      btn.onclick = () => {
        selectedItem = item;
        alert("Dipilih: " + item);
      };

      container.appendChild(btn);
      container.appendChild(document.createElement("br"));
    });
  }

  async function loadData() {
    const snap = await getDoc(doc(db, "kupon", userId));

    if (snap.exists()) {
      renderButtons(snap.data());
    }
  }

  function onScanSuccess(decodedText) {
    scanner.stop();

    const parts = decodedText.split("|");
    userId = parts[0];
    komoditiList = parts[1].split(",");

    document.getElementById("info").innerText = "ID: " + userId;

    loadData();
  }

  // 🔥 START SCAN - AUTO PILIH KAMERA BELAKANG
  window.startScan = function() {
    scanner = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
      .then(devices => {
        if (devices.length > 0) {

          // 🔥 PILIH KAMERA BELAKANG
          let backCamera = devices.find(device =>
            device.label.toLowerCase().includes("back") ||
            device.label.toLowerCase().includes("rear")
          );

          let cameraId = backCamera ? backCamera.id : devices[0].id;

          scanner.start(
            cameraId,
            { fps: 10, qrbox: 250 },
            onScanSuccess
          );

        } else {
          alert("Kamera tidak ditemukan");
        }
      })
      .catch(err => {
        alert("Izin kamera ditolak / error: " + err);
        console.error(err);
      });
  }

  window.simpan = async function() {
    if (!selectedItem) {
      alert("Pilih komoditi dulu!");
      return;
    }

    const distributor = document.getElementById("distributor").value;

    if (!distributor) {
      alert("Pilih distributor!");
      return;
    }

    await updateDoc(doc(db, "kupon", userId), {
      [selectedItem]: true
    });

    await addDoc(collection(db, "distribusi"), {
      id_user: userId,
      komoditi: selectedItem,
      distributor: distributor,
      waktu: new Date()
    });

    alert("Berhasil: " + selectedItem);

    selectedItem = "";
    loadData();
  }
</script>

</body>
</html>
