<!DOCTYPE html>

<html>
<head>
  <title>Scan Distribusi</title>

  <!-- 🔥 WAJIB untuk HP -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 15px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      background: #28a745;
      color: white;
    }

    button:disabled {
      background: #ccc;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    /* 🔥 BIKIN TOMBOL KOMODITI GRID */
    #btn_beras, #btn_minyak, #btn_telur {
      width: 32%;
      display: inline-block;
    }

    /* 🔥 CARD STYLE */
    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>

</head>

<body>

<h2>📦 Scan QR</h2>

<div class="card">
  <input type="text" id="scanInput" placeholder="Tempel / Scan QR">
  <button onclick="ambilData()">🔍 Ambil Data</button>
</div>

<div class="card">
  <h3 id="nama">Belum ada data</h3>
</div>

<div class="card">
  <h3>🛒 Pilih Komoditi</h3>
  <button onclick="ambil('beras')" id="btn_beras">Beras</button>
  <button onclick="ambil('minyak')" id="btn_minyak">Minyak</button>
  <button onclick="ambil('telur')" id="btn_telur">Telur</button>
</div>

<div class="card">
  <h3>🏢 Distributor</h3>
  <select id="distributor">
    <option>Gudang A</option>
    <option>Gudang B</option>
  </select>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentId = "";

  window.ambilData = async function() {
    const id = document.getElementById("scanInput").value;
    currentId = id;

    const docRef = doc(db, "registrasi", id);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      document.getElementById("nama").innerText = "👤 " + docSnap.data().nama;

      const kuponRef = doc(db, "kupon", id);
      const kuponSnap = await getDoc(kuponRef);
      const data = kuponSnap.data();

      if (data.beras) document.getElementById("btn_beras").disabled = true;
      if (data.minyak) document.getElementById("btn_minyak").disabled = true;
      if (data.telur) document.getElementById("btn_telur").disabled = true;

    } else {
      alert("Data tidak ditemukan!");
    }
  }

  window.ambil = async function(item) {
    const distributor = document.getElementById("distributor").value;

    const kuponRef = doc(db, "kupon", currentId);
    await updateDoc(kuponRef, {
      [item]: true
    });

    await addDoc(collection(db, "distribusi"), {
      id_user: currentId,
      komoditi: item,
      distributor: distributor,
      waktu: new Date()
    });

    alert(item + " berhasil diserahkan");

    location.reload();
  }
</script>

</body>
</html>
