<!DOCTYPE html>
<html>
<head>
  <title>Petugas 2 - Komoditi</title>

  <!-- MOBILE VIEW -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 15px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }

    select, button {
      width: 100%;
      height: 50px;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      font-weight: bold;
    }

    button:active {
      background: #0056b3;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      margin: 8px 0;
      font-size: 16px;
    }

    input[type="checkbox"] {
      transform: scale(1.5);
      margin-right: 10px;
    }

    #qrcode {
      text-align: center;
      margin-top: 10px;
    }

    .btn-print {
      background: #28a745;
    }

    .btn-print:active {
      background: #1e7e34;
    }
  </style>
</head>

<body>

<h2>📦 Petugas Komoditi</h2>

<div class="card">
  <label>Nama Penerima</label>
  <select id="userSelect"></select>
</div>

<div class="card">
  <label>Pilih Komoditi</label>
  <div id="komoditiList"></div>
</div>

<div class="card">
  <button onclick="buatQR()">🎯 Generate QR</button>
</div>

<div class="card">
  <h3 style="text-align:center;">QR Code</h3>
  <div id="qrcode"></div>
</div>

<div class="card">
  <button class="btn-print" onclick="printQR()">🖨️ Print Struk</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let lastQR = "";

  // LOAD USER
  async function loadUser() {
    const snapshot = await getDocs(collection(db, "registrasi"));
    const select = document.getElementById("userSelect");

    snapshot.forEach(docSnap => {
      const option = document.createElement("option");
      option.value = docSnap.id;
      option.text = docSnap.data().nama;
      select.appendChild(option);
    });
  }

  // LOAD KOMODITI
  async function loadKomoditi() {
    const snapshot = await getDocs(collection(db, "master_komoditi"));
    const container = document.getElementById("komoditiList");

    snapshot.forEach(docSnap => {
      const nama = docSnap.data().nama;

      const div = document.createElement("div");
      div.className = "checkbox-item";

      div.innerHTML = `
        <input type="checkbox" value="${nama}">
        <label>${nama}</label>
      `;

      container.appendChild(div);
    });
  }

  loadUser();
  loadKomoditi();

  // GENERATE QR
  window.buatQR = async function() {
    const userId = document.getElementById("userSelect").value;
    const checkboxes = document.querySelectorAll("#komoditiList input:checked");

    if (checkboxes.length === 0) {
      alert("Pilih komoditi dulu!");
      return;
    }

    let komoditi = [];
    checkboxes.forEach(cb => komoditi.push(cb.value));

    let dataKupon = {};
    komoditi.forEach(k => dataKupon[k] = false);

    await setDoc(doc(db, "kupon", userId), dataKupon, { merge: true });

    const qrData = userId + "|" + komoditi.join(",");
    lastQR = qrData;

    const qrDiv = document.getElementById("qrcode");
    qrDiv.innerHTML = "";

    QRCode.toCanvas(qrData, { width: 200 }, function (error, canvas) {
      qrDiv.appendChild(canvas);
    });
  }

  // PRINT THERMAL AUTO
  window.printQR = function() {
    const canvas = document.querySelector("#qrcode canvas");

    if (!canvas) {
      alert("Generate QR dulu!");
      return;
    }

    const img = canvas.toDataURL("image/png");
    const userId = lastQR.split("|")[0];
    const komoditi = lastQR.split("|")[1].split(",");

    const win = window.open("", "_blank");

    win.document.write(`
      <html>
      <head>
        <style>
          body {
            text-align: center;
            font-family: monospace;
            font-size: 12px;
            width: 280px;
          }
          img {
            width: 160px;
          }
          hr {
            border: 1px dashed black;
          }
        </style>
      </head>
      <body>

        <h3>PASAR MURAH</h3>
        <hr>

        <div>ID: ${userId}</div>

        <img src="${img}">

        <hr>

        <div>Komoditi:</div>
        ${komoditi.map(k => `<div>- ${k}</div>`).join("")}

        <hr>
        <div>Terima Kasih</div>

        <script>
          window.onload = function() {
            window.print();
            setTimeout(() => window.close(), 500);
          }
        <\/script>

      </body>
      </html>
    `);

    win.document.close();
  }

</script>

</body>
</html>
