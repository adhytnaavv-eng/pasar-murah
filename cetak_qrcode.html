<!DOCTYPE html>

<html>
<head>
  <title>Petugas 2 - Kupon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 15px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
    }

    select option:disabled {
      color: red;
    }

    button {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }

    .btn-primary { background: #007bff; color: white; }
    .btn-save { background: #28a745; color: white; }
    .btn-print { background: #ff9800; color: white; }

    .komoditi-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .komoditi-btn {
      background: #28a745;
      color: white;
    }

    .selected {
      background: #ff9800 !important;
    }
  </style>

</head>

<body>

<h2>🎫 Petugas Kupon</h2>

<div class="card">
  <h3>Pilih Warga</h3>
  <select id="userSelect"></select>
</div>

<div class="card">
  <h3>Pilih Komoditi</h3>
  <div id="komoditiList" class="komoditi-container"></div>
</div>

<div class="card">
  <button class="btn-primary" onclick="generateQR()">🎯 Generate QR</button>

  <div id="qrcode"></div>

  <button id="btnSave" class="btn-save" onclick="simpan()" disabled>
    💾 Simpan Data
  </button>

  <button id="btnPrint" class="btn-print" onclick="cetak()" disabled>
    🖨 Cetak
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, collection, getDocs, doc, setDoc 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let selectedKomoditi = [];
  let qrReady = false;

  // LOAD USER
  async function loadUser() {
    const snapshot = await getDocs(collection(db, "registrasi"));
    const select = document.getElementById("userSelect");

    snapshot.forEach(docSnap => {
      const data = docSnap.data();

      const opt = document.createElement("option");
      opt.value = docSnap.id;
      opt.text = data.nama;

      if (data.status_cetak === true) {
        opt.disabled = true;
        opt.style.color = "red";
        opt.text = data.nama + " (SUDAH CETAK)";
      }

      select.appendChild(opt);
    });
  }

  // LOAD KOMODITI
  async function loadKomoditi() {
    const snapshot = await getDocs(collection(db, "master_komoditi"));
    const container = document.getElementById("komoditiList");

    snapshot.forEach(docSnap => {
      const data = docSnap.data();

      const btn = document.createElement("button");
      btn.innerText = data.nama;
      btn.className = "komoditi-btn";

      btn.onclick = () => {
        const kode = data.kode;

        if (selectedKomoditi.includes(kode)) {
          selectedKomoditi = selectedKomoditi.filter(i => i !== kode);
          btn.classList.remove("selected");
        } else {
          selectedKomoditi.push(kode);
          btn.classList.add("selected");
        }
      };

      container.appendChild(btn);
    });
  }

  loadUser();
  loadKomoditi();

  // GENERATE QR
  window.generateQR = function() {
    const id = document.getElementById("userSelect").value;

    if (!id || selectedKomoditi.length === 0) {
      alert("Pilih warga dan komoditi!");
      return;
    }

    QRCode.toCanvas(id, function (err, canvas) {
      const div = document.getElementById("qrcode");
      div.innerHTML = "";
      div.appendChild(canvas);
    });

    qrReady = true;
    document.getElementById("btnSave").disabled = false;
  }

  // SIMPAN DATA
  window.simpan = async function() {
    const id = document.getElementById("userSelect").value;

    let dataKupon = {};

    selectedKomoditi.forEach(k => {
      dataKupon[k] = false;
    });

    await setDoc(doc(db, "kupon", id), {
      ...dataKupon,
      status_cetak: true
    });

    await setDoc(doc(db, "registrasi", id), {
      status_cetak: true
    }, { merge: true });

    alert("✅ Data berhasil disimpan");

    document.getElementById("btnPrint").disabled = false;
  }

  // CETAK
  window.cetak = function() {
    if (!qrReady) {
      alert("Generate QR dulu!");
      return;
    }

    window.print();
  }
</script>

</body>
</html>
