<!DOCTYPE html>
<html>
<head>
  <title>Petugas Komoditi</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 15px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    select, button {
      width: 100%;
      height: 50px;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 10px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    .btn-print {
      background: #28a745;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      margin: 8px 0;
    }

    input[type="checkbox"] {
      transform: scale(1.5);
      margin-right: 10px;
    }

    .sudah {
      color: red;
      font-weight: bold;
    }

    #qrcode {
      text-align: center;
    }
  </style>
</head>

<body>

<h2>📦 Petugas Komoditi</h2>

<div class="card">
  <label>Nama Penerima</label>
  <select id="userSelect"></select>
</div>

<div class="card">
  <label>Komoditi</label>
  <div id="komoditiList"></div>
</div>

<div class="card">
  <button onclick="buatQR()">🎯 Generate QR</button>
</div>

<div class="card">
  <div id="qrcode"></div>
</div>

<div class="card">
  <button class="btn-print" onclick="printQR()">🖨️ Print</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "pasar-murah-kk.firebaseapp.com",
  projectId: "pasar-murah-kk"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let lastQR = "";
let userStatus = {}; // simpan status lokal

// 🔹 LOAD USER + STATUS
async function loadUser() {
  const snapshot = await getDocs(collection(db, "registrasi"));
  const select = document.getElementById("userSelect");

  select.innerHTML = "";

  for (const docSnap of snapshot.docs) {
    const id = docSnap.id;
    const nama = docSnap.data().nama;

    // cek status sudah ambil atau belum
    const kuponSnap = await getDoc(doc(db, "kupon", id));
    let sudah = false;

    if (kuponSnap.exists()) {
      const data = kuponSnap.data();
      sudah = Object.values(data).every(v => v === true);
    }

    userStatus[id] = sudah;

    const option = document.createElement("option");
    option.value = id;
    option.text = nama;

    if (sudah) {
      option.text += " (SUDAH)";
      option.classList.add("sudah");
    }

    select.appendChild(option);
  }
}

// 🔹 VALIDASI PILIH USER
document.getElementById("userSelect").addEventListener("change", function() {
  const userId = this.value;

  if (userStatus[userId]) {
    alert("Sudah Menerima Subsidi");
    this.value = "";
  }
});

// 🔹 LOAD KOMODITI
async function loadKomoditi() {
  const snapshot = await getDocs(collection(db, "master_komoditi"));
  const container = document.getElementById("komoditiList");

  snapshot.forEach(docSnap => {
    const nama = docSnap.data().nama;

    const div = document.createElement("div");
    div.className = "checkbox-item";

    div.innerHTML = `
      <input type="checkbox" value="${nama}">
      <label>${nama}</label>
    `;

    container.appendChild(div);
  });
}

loadUser();
loadKomoditi();

// 🔹 GENERATE QR
window.buatQR = async function() {
  const userId = document.getElementById("userSelect").value;

  if (!userId) {
    alert("Pilih user dulu!");
    return;
  }

  if (userStatus[userId]) {
    alert("User sudah menerima!");
    return;
  }

  const checkboxes = document.querySelectorAll("#komoditiList input:checked");

  if (checkboxes.length === 0) {
    alert("Pilih komoditi!");
    return;
  }

  let komoditi = [];
  checkboxes.forEach(cb => komoditi.push(cb.value));

  let dataKupon = {};
  komoditi.forEach(k => dataKupon[k] = false);

  await setDoc(doc(db, "kupon", userId), dataKupon, { merge: true });

  lastQR = userId + "|" + komoditi.join(",");

  const qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";

  QRCode.toCanvas(lastQR, { width: 200 }, function (err, canvas) {
    qrDiv.appendChild(canvas);
  });
}

// 🔹 PRINT + NONAKTIFKAN USER
window.printQR = async function() {
  const canvas = document.querySelector("#qrcode canvas");

  if (!canvas) {
    alert("Generate QR dulu!");
    return;
  }

  const userId = lastQR.split("|")[0];

  // tandai semua komoditi jadi true
  const komoditi = lastQR.split("|")[1].split(",");
  let updateData = {};
  komoditi.forEach(k => updateData[k] = true);

  await updateDoc(doc(db, "kupon", userId), updateData);

  userStatus[userId] = true;

  const img = canvas.toDataURL();

  const win = window.open("", "_blank");
  win.document.write(`
    <html>
    <body style="text-align:center;font-family:monospace;font-size:12px;width:280px;">
      <h3>PASAR MURAH</h3>
      <hr>
      <div>ID: ${userId}</div>
      <img src="${img}" width="150">
      <hr>
      ${komoditi.map(k => `<div>- ${k}</div>`).join("")}
      <hr>
      <div>Terima Kasih</div>
      <script>
        window.onload = function(){
          window.print();
          setTimeout(()=>window.close(),500);
        }
      <\/script>
    </body>
    </html>
  `);

  win.document.close();

  // reload user biar merah
  loadUser();
}

</script>

</body>
</html>
