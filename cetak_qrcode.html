<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petugas 2 - Generate & Print Kupon</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        
        label { font-weight: bold; display: block; margin: 15px 0 8px; color: #555; }
        select, button { width: 100%; height: 50px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; margin-bottom: 10px; }
        
        /* Style Dropdown */
        option.terpakai { color: #d93025 !important; font-weight: bold; background-color: #fce8e6; }
        option.tersedia { color: #188038 !important; }

        .komoditi-box { background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .checkbox-item input { transform: scale(1.4); margin-right: 15px; cursor: pointer; }

        .btn-qr { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-print { background: #34a853; color: white; border: none; font-weight: bold; cursor: pointer; display: none; margin-top: 15px; }
        
        #qrcode { display: flex; justify-content: center; margin: 20px 0; padding: 10px; background: white; }
        .status-info { font-size: 12px; text-align: center; color: #777; margin-top: -10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📋 Form Petugas 2</h2>
        <p class="status-info">Pilih penerima dan tentukan komoditi yang didapat.</p>
        
        <label>Nama Penerima:</label>
        <select id="userSelect">
            <option value="">-- Memuat Data Nama... --</option>
        </select>

        <label>Daftar Komoditi:</label>
        <div id="komoditiList" class="komoditi-box">
            <small>Memuat komoditi...</small>
        </div>

        <button class="btn-qr" onclick="buatQR()">🎯 Generate QR Code</button>
    </div>

    <div class="card" id="previewSection" style="display:none;">
        <label>Preview Kupon:</label>
        <div id="qrcode"></div>
        <button class="btn-print" id="btnPrint" onclick="prosesCetak()">🖨️ Print & Nonaktifkan Nama</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getFirestore, collection, onSnapshot, doc, setDoc, getDocs 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
        authDomain: "pasar-murah-kk.firebaseapp.com",
        projectId: "pasar-murah-kk",
        storageBucket: "pasar-murah-kk.firebasestorage.app",
        messagingSenderId: "964431531376",
        appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let daftarOrang = [];
    let idSudahCetak = new Set();
    let dataTerpilih = null;

    // --- 1. LOAD MASTER KOMODITI ---
    async function loadMasterBarang() {
        try {
            const snap = await getDocs(collection(db, "master_komoditi"));
            const container = document.getElementById("komoditiList");
            container.innerHTML = "";
            snap.forEach(d => {
                const nama = d.data().nama || d.data().Nama;
                const div = document.createElement("div");
                div.className = "checkbox-item";
                div.innerHTML = `<input type="checkbox" value="${nama}" id="chk_${d.id}"> <label for="chk_${d.id}">${nama}</label>`;
                container.appendChild(div);
            });
        } catch (e) { console.error("Gagal load komoditi:", e); }
    }

    // --- 2. MONITOR REAL-TIME DATA ---
    function jalankanMonitoring() {
        // Pantau Koleksi Registrasi
        onSnapshot(collection(db, "registrasi"), (snap) => {
            daftarOrang = [];
            snap.forEach(d => {
                daftarOrang.push({ id: d.id, nama: d.data().nama || d.data().Nama });
            });
            renderDropdown();
        });

        // Pantau Koleksi Kupon (Untuk filter warna MERAH)
        onSnapshot(collection(db, "kupon"), (snap) => {
            idSudahCetak.clear();
            snap.forEach(d => {
                // Hanya masukkan ke daftar merah jika status cetak = true
                if (d.data().status_cetak === true) {
                    idSudahCetak.add(d.id);
                }
            });
            renderDropdown();
        });
    }

    // --- 3. RENDER DROPDOWN NAMA ---
    function renderDropdown() {
        const select = document.getElementById("userSelect");
        const selectedSebelumnya = select.value;
        select.innerHTML = '<option value="">-- Pilih Nama Penerima --</option>';

        daftarOrang.forEach(user => {
            const opt = document.createElement("option");
            opt.value = user.id;
            
            if (idSudahCetak.has(user.id)) {
                opt.text = "🔴 " + user.nama + " (Sudah Ambil)";
                opt.className = "terpakai";
                opt.disabled = true; // Tidak bisa dipilih lagi
            } else {
                opt.text = "🟢 " + user.nama;
                opt.className = "tersedia";
            }
            select.appendChild(opt);
        });
        select.value = selectedSebelumnya;
    }

    // --- 4. BUAT QR CODE ---
    window.buatQR = function() {
        const userId = document.getElementById("userSelect").value;
        const selectEl = document.getElementById("userSelect");
        
        if (!userId) return alert("Pilih nama penerima dulu!");

        const namaUser = selectEl.options[selectEl.selectedIndex].text.replace("🟢 ", "");
        const checkboxChecked = document.querySelectorAll("#komoditiList input:checked");

        if (checkboxChecked.length === 0) return alert("Pilih minimal satu komoditi!");

        let komoditiSelected = [];
        checkboxChecked.forEach(cb => komoditiSelected.push(cb.value));

        // Data untuk disimpan nanti
        dataTerpilih = { id: userId, nama: namaUser, barang: komoditiSelected };

        // Isi QR: ID|Nama|Barang1,Barang2
        const teksQR = `${userId}|${namaUser}|${komoditiSelected.join(",")}`;

        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = "";

        QRCode.toCanvas(teksQR, { width: 200, margin: 2 }, (err, canvas) => {
            if (err) return alert("Gagal membuat QR");
            qrDiv.appendChild(canvas);
            document.getElementById("previewSection").style.display = "block";
            document.getElementById("btnPrint").style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        });
    };

    // --- 5. PROSES SIMPAN & CETAK ---
    window.prosesCetak = async function() {
        const canvas = document.querySelector("#qrcode canvas");
        if (!canvas || !dataTerpilih) return;

        // Persiapkan data untuk Firebase
        const payload = {
            nama_penerima: dataTerpilih.nama,
            waktu_cetak: new Date().toISOString(),
            status_cetak: true // Ini yang memicu nama jadi merah
        };
        
        // Buat status tiap barang menjadi false (belum diambil di petugas 3)
        dataTerpilih.barang.forEach(b => payload[b] = false);

        try {
            // A. Simpan ke koleksi 'kupon' dengan ID yang sama dengan 'registrasi'
            await setDoc(doc(db, "kupon", dataTerpilih.id), payload);

            // B. Perintah Cetak ke Printer
            const imgData = canvas.toDataURL("image/png");
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <body style="text-align:center; font-family: 'Courier New', Courier, monospace; width: 280px; margin: auto; padding: 10px;">
                    <h2 style="margin-bottom:5px;">PASAR MURAH</h2>
                    <p style="margin:0;">----------------------------</p>
                    <h3 style="margin:10px 0;">${dataTerpilih.nama}</h3>
                    <img src="${imgData}" style="width:180px;">
                    <div style="text-align:left; margin-top:10px; font-size:14px;">
                        <b>KOMODITI:</b><br>
                        ${dataTerpilih.barang.map(b => "- " + b).join("<br>")}
                    </div>
                    <p>----------------------------</p>
                    <p style="font-size:12px;">Bawa struk ini ke meja penyerahan barang.</p>
                    <script>
                        window.onload = function() { window.print(); window.close(); };
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();

            alert("Berhasil! Data " + dataTerpilih.nama + " sekarang dinonaktifkan.");
            resetHalaman();

        } catch (error) {
            alert("Error simpan data: " + error.message);
        }
    };

    function resetHalaman() {
        document.getElementById("previewSection").style.display = "none";
        document.getElementById("userSelect").value = "";
        document.querySelectorAll("#komoditiList input").forEach(c => c.checked = false);
        dataTerpilih = null;
    }

    // Inisialisasi
    loadMasterBarang();
    jalankanMonitoring();

</script>
</body>
</html>
