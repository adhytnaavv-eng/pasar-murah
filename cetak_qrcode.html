<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petugas 2 - Monitoring Komoditi</title>
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    h2 { text-align: center; color: #2c3e50; }
    
    label { font-weight: bold; display: block; margin: 15px 0 5px; }
    select, button { width: 100%; height: 50px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
    
    /* Style khusus untuk option yang sudah dinonaktifkan */
    option.sudah-ambil { color: red !important; font-weight: bold; }

    .komoditi-list { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-top: 10px; }
    .item { display: flex; align-items: center; margin-bottom: 10px; }
    .item input { transform: scale(1.3); margin-right: 12px; }

    .btn-generate { background: #1a73e8; color: white; border: none; margin-top: 20px; cursor: pointer; }
    .btn-print { background: #28a745; color: white; border: none; margin-top: 15px; display: none; cursor: pointer; }
    
    #qrcode { display: flex; justify-content: center; margin-top: 20px; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <h2>📋 Petugas 2</h2>
  
  <label>Nama Penerima:</label>
  <select id="userSelect">
    <option value="">-- Memuat Nama... --</option>
  </select>

  <label>Pilih Komoditi:</label>
  <div id="komoditiList" class="komoditi-list"></div>

  <button class="btn-generate" onclick="generateQR()">🎯 Generate QR Code</button>
  
  <div id="qrcode"></div>
  <button class="btn-print" id="btnPrint" onclick="simpanDanPrint()">🖨️ Print & Nonaktifkan</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, collection, onSnapshot, doc, setDoc, getDocs 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let listRegistrasi = [];
  let listSudahAmbil = new Set();
  let tempQRData = null;

  // --- 1. AMBIL MASTER KOMODITI ---
  async function loadKomoditi() {
    const snap = await getDocs(collection(db, "master_komoditi"));
    const container = document.getElementById("komoditiList");
    container.innerHTML = "";
    snap.forEach(doc => {
      const nama = doc.data().nama || doc.data().Nama;
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `<input type="checkbox" value="${nama}"> <label>${nama}</label>`;
      container.appendChild(div);
    });
  }

  // --- 2. MONITOR REAL-TIME (Untuk Warna Merah & Disable) ---
  function initApp() {
    // Pantau pendaftar
    onSnapshot(collection(db, "registrasi"), (snap) => {
      listRegistrasi = [];
      snap.forEach(d => listRegistrasi.push({ id: d.id, nama: d.data().nama || d.data().Nama }));
      updateDropdown();
    });

    // Pantau yang sudah ambil (koleksi kupon)
    onSnapshot(collection(db, "kupon"), (snap) => {
      listSudahAmbil.clear();
      snap.forEach(d => listSudahAmbil.add(d.id));
      updateDropdown();
    });
  }

  // --- 3. UPDATE DROPDOWN (LOGIKA WARNA MERAH) ---
  function updateDropdown() {
    const select = document.getElementById("userSelect");
    const currentVal = select.value;
    select.innerHTML = '<option value="">-- Pilih Nama --</option>';

    listRegistrasi.forEach(user => {
      const option = document.createElement("option");
      option.value = user.id;
      
      // Jika ID ada di koleksi kupon, tandai merah dan nonaktifkan
      if (listSudahAmbil.has(user.id)) {
        option.text = user.nama + " (SUDAH AMBIL)";
        option.classList.add("sudah-ambil");
        option.disabled = true; // Tidak bisa dipilih lagi
      } else {
        option.text = user.nama;
      }
      select.appendChild(option);
    });
    select.value = currentVal;
  }

  // --- 4. GENERATE QR ---
  window.generateQR = function() {
    const select = document.getElementById("userSelect");
    const userId = select.value;
    if (!userId) return alert("Pilih nama!");

    const userName = select.options[select.selectedIndex].text;
    const checks = document.querySelectorAll("#komoditiList input:checked");
    if (checks.length === 0) return alert("Pilih komoditi!");

    let komoditi = [];
    checks.forEach(c => komoditi.push(c.value));

    tempQRData = { id: userId, nama: userName, komoditi: komoditi };
    const qrString = `${userId}|${userName}|${komoditi.join(",")}`;

    const qrDiv = document.getElementById("qrcode");
    qrDiv.innerHTML = "";
    QRCode.toCanvas(qrString, { width: 200 }, (err, canvas) => {
      qrDiv.appendChild(canvas);
      document.getElementById("btnPrint").style.display = "block";
    });
  };

  // --- 5. SIMPAN KE FIREBASE & PRINT ---
  window.simpanDanPrint = async function() {
    const canvas = document.querySelector("#qrcode canvas");
    if (!canvas || !tempQRData) return;

    // Menandai di Firebase agar status berubah
    const docData = {
      nama: tempQRData.nama,
      waktu: new Date().toISOString(),
      cetak: true
    };
    tempQRData.komoditi.forEach(k => docData[k] = false);

    try {
      // Data tetap ada di 'registrasi', tapi ID-nya dicatat di 'kupon' sebagai tanda nonaktif
      await setDoc(doc(db, "kupon", tempQRData.id), docData);

      // Cetak Struk
      const img = canvas.toDataURL();
      const win = window.open('', '_blank');
      win.document.write(`
        <body style="text-align:center; font-family:monospace; width:250px; margin:auto;">
          <h3>PASAR MURAH</h3><hr>
          <b>${tempQRData.nama}</b><br>
          <img src="${img}" style="width:150px;"><br>
          <div style="text-align:left;">
            Komoditi:<br> ${tempQRData.komoditi.map(k => "- "+k).join("<br>")}
          </div><hr>
          <script>window.onload=function(){window.print();window.close();}<\/script>
        </body>
      `);
      win.document.close();

      alert("Selesai! Nama tersebut sekarang sudah nonaktif (berwarna merah).");
      resetForm();
    } catch (e) { alert("Error: " + e.message); }
  };

  function resetForm() {
    document.getElementById("userSelect").value = "";
    document.getElementById("btnPrint").style.display = "none";
    document.getElementById("qrcode").innerHTML = "";
    document.querySelectorAll("#komoditiList input").forEach(c => c.checked = false);
  }

  loadKomoditi();
  initApp();
</script>
</body>
</html>
