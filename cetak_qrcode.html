<!DOCTYPE html>
<html>
<head>
  <title>Petugas 2 - Komoditi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; background: #f0f2f5; padding: 20px; max-width: 500px; margin: auto; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h2 { text-align: center; color: #1a73e8; }
    select, button { width: 100%; height: 45px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
    button { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #1557b0; }
    .btn-print { background: #34a853; display: none; margin-top: 15px; } /* Sembunyi sampai QR muncul */
    #qrcode { display: flex; justify-content: center; margin-top: 15px; }
    .komoditi-item { margin: 8px 0; display: flex; align-items: center; }
    input[type="checkbox"] { transform: scale(1.2); margin-right: 10px; }
  </style>
</head>
<body>

<div class="card">
  <h2>📋 Petugas 2</h2>
  
  <label><b>Pilih Nama Penerima:</b></label>
  <select id="userSelect">
    <option value="">-- Memuat Nama... --</option>
  </select>

  <br><br>

  <label><b>Pilih Komoditi:</b></label>
  <div id="komoditiList"></div>

  <button onclick="buatQR()">🎯 Generate QR Code</button>
</div>

<div class="card" id="qrSection" style="display:none;">
  <h3>Preview QR Code:</h3>
  <div id="qrcode"></div>
  <button class="btn-print" id="btnPrint" onclick="cetakDanSelesaikan()">🖨️ Print & Selesaikan</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, collection, onSnapshot, doc, setDoc, getDocs 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let dataRegistrasi = [];
  let dataKuponSelesai = new Set();
  let selectedNama = "";

  // --- 1. MONITOR DATA SECARA REAL-TIME ---
  // Kita pantau koleksi 'registrasi' (semua nama) AND 'kupon' (yang sudah diproses)
  function startListening() {
    // Pantau yang sudah ambil kupon
    onSnapshot(collection(db, "kupon"), (snapshot) => {
      dataKuponSelesai.clear();
      snapshot.forEach(doc => dataKuponSelesai.add(doc.id));
      renderDropdown(); // Update list setiap ada yang selesai
    });

    // Pantau daftar registrasi
    onSnapshot(collection(db, "registrasi"), (snapshot) => {
      dataRegistrasi = [];
      snapshot.forEach(doc => {
        dataRegistrasi.push({ id: doc.id, nama: doc.data().nama });
      });
      renderDropdown();
    });
  }

  // --- 2. RENDER DROPDOWN (Hanya yang BELUM ada di koleksi kupon) ---
  function renderDropdown() {
    const select = document.getElementById("userSelect");
    select.innerHTML = '<option value="">-- Pilih Nama --</option>';

    dataRegistrasi.forEach(user => {
      // JIKA ID user belum ada di koleksi kupon, tampilkan di dropdown
      if (!dataKuponSelesai.has(user.id)) {
        const option = document.createElement("option");
        option.value = user.id;
        option.text = user.nama;
        select.appendChild(option);
      }
    });
  }

  // --- 3. LOAD KOMODITI ---
  async function loadKomoditi() {
    const snapshot = await getDocs(collection(db, "master_komoditi"));
    const container = document.getElementById("komoditiList");
    snapshot.forEach(docSnap => {
      const nama = docSnap.data().nama;
      const div = document.createElement("div");
      div.className = "komoditi-item";
      div.innerHTML = `<input type="checkbox" value="${nama}"> <label>${nama}</label>`;
      container.appendChild(div);
    });
  }

  // --- 4. GENERATE QR (Hanya Preview) ---
  window.buatQR = function() {
    const userId = document.getElementById("userSelect").value;
    const selectEl = document.getElementById("userSelect");
    selectedNama = selectEl.options[selectEl.selectedIndex].text;

    const checkboxes = document.querySelectorAll("#komoditiList input:checked");
    if (!userId) return alert("Pilih nama dulu!");
    if (checkboxes.length === 0) return alert("Pilih komoditi!");

    let komoditi = [];
    checkboxes.forEach(cb => komoditi.push(cb.value));

    // Isi data QR
    const qrData = userId + "|" + selectedNama + "|" + komoditi.join(",");

    const qrDiv = document.getElementById("qrcode");
    qrDiv.innerHTML = "";

    QRCode.toCanvas(qrData, { width: 200 }, function (error, canvas) {
      if (error) return console.error(error);
      qrDiv.appendChild(canvas);
      document.getElementById("qrSection").style.display = "block";
      document.getElementById("btnPrint").style.display = "block";
    });
  };

  // --- 5. PRINT & SELESAIKAN (Update Firebase agar Nama Hilang) ---
  window.cetakDanSelesaikan = async function() {
    const userId = document.getElementById("userSelect").value;
    const checkboxes = document.querySelectorAll("#komoditiList input:checked");
    const canvas = document.querySelector("#qrcode canvas");

    if (!canvas) return;

    let komoditi = [];
    checkboxes.forEach(cb => komoditi.push(cb.value));

    // 🔹 SIMPAN KE DATABASE (Ini yang membuat nama hilang dari daftar)
    let dataKupon = {
      nama: selectedNama,
      waktu_generate: new Date().toISOString(),
      status_cetak: true
    };
    komoditi.forEach(k => dataKupon[k] = false); // Status awal distribusi false

    try {
      await setDoc(doc(db, "kupon", userId), dataKupon, { merge: true });

      // 🔹 PROSES PRINT
      const imgData = canvas.toDataURL("image/png");
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <html>
          <body style="text-align:center;font-family:sans-serif;">
            <h2>KUPON PASAR MURAH</h2>
            <hr>
            <h3>${selectedNama}</h3>
            <img src="${imgData}" />
            <p>Daftar Komoditi:<br><b>${komoditi.join(", ")}</b></p>
            <script>
              window.onload = function() { window.print(); window.close(); };
            <\/script>
          </body>
        </html>
      `);
      printWindow.document.close();

      // Reset tampilan
      alert("Print berhasil! Nama " + selectedNama + " telah dinonaktifkan.");
      resetForm();

    } catch (e) {
      alert("Gagal menyimpan: " + e);
    }
  };

  function resetForm() {
    document.getElementById("qrSection").style.display = "none";
    document.getElementById("userSelect").value = "";
    document.querySelectorAll("#komoditiList input").forEach(cb => cb.checked = false);
  }

  // Jalankan fungsi awal
  startListening();
  loadKomoditi();
</script>

</body>
</html>
