<!DOCTYPE html>
<html>
<head>
  <title>Petugas Komoditi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 15px;
    }

    h2 { text-align: center; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    select, button {
      width: 100%;
      height: 50px;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 10px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    .btn-print { background: #28a745; }

    .checkbox-item {
      display: flex;
      align-items: center;
      margin: 8px 0;
    }

    input[type="checkbox"] {
      transform: scale(1.4);
      margin-right: 10px;
    }

    .sudah {
      color: red;
      font-weight: bold;
    }

    #qrcode { text-align: center; }
  </style>
</head>

<body>

<h2>📦 Petugas Komoditi</h2>

<div class="card">
  <label>Nama</label>
  <select id="userSelect">
    <option value="">-- Pilih --</option>
  </select>
</div>

<div class="card">
  <label>Komoditi</label>
  <div id="komoditiList"></div>
</div>

<div class="card">
  <button onclick="buatQR()">🎯 Generate QR</button>
</div>

<div class="card">
  <div id="qrcode"></div>
</div>

<div class="card">
  <button class="btn-print" onclick="printQR()">🖨️ Print</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, onSnapshot,
  doc, setDoc, getDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI_PUNYA_KAMU",
  authDomain: "ISI",
  projectId: "ISI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== STATE =====
let userList = [];
let kuponStatus = {};
let lastQR = "";
let lastNama = "";

// ===== ELEMENT =====
const select = document.getElementById("userSelect");

// ===== REALTIME USER =====
onSnapshot(collection(db, "registrasi"), (snapshot) => {
  userList = [];
  snapshot.forEach(docSnap => {
    userList.push({
      id: docSnap.id,
      nama: docSnap.data().nama
    });
  });
  renderUser();
});

// ===== REALTIME KUPON (INI KUNCI FIX) =====
onSnapshot(collection(db, "kupon"), (snapshot) => {
  kuponStatus = {};

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    kuponStatus[docSnap.id] = data.status === "selesai";
  });

  renderUser();
});

// ===== RENDER USER =====
function renderUser() {
  select.innerHTML = '<option value="">-- Pilih --</option>';

  userList.forEach(user => {
    const option = document.createElement("option");
    option.value = user.id;

    const sudah = kuponStatus[user.id];

    option.text = user.nama;

    if (sudah) {
      option.text += " (SUDAH)";
      option.disabled = true;
      option.classList.add("sudah");
    }

    select.appendChild(option);
  });
}

// ===== VALIDASI PILIH =====
select.addEventListener("change", function() {
  const id = this.value;

  if (kuponStatus[id]) {
    alert("Sudah Menerima Subsidi");
    this.value = "";
  }
});

// ===== LOAD KOMODITI =====
onSnapshot(collection(db, "master_komoditi"), (snapshot) => {
  const container = document.getElementById("komoditiList");
  container.innerHTML = "";

  snapshot.forEach(docSnap => {
    const nama = docSnap.data().nama;

    const div = document.createElement("div");
    div.className = "checkbox-item";

    div.innerHTML = `
      <input type="checkbox" value="${nama}">
      <label>${nama}</label>
    `;

    container.appendChild(div);
  });
});

// ===== GENERATE QR =====
window.buatQR = async function() {
  const userId = select.value;
  if (!userId) return alert("Pilih user dulu!");

  if (kuponStatus[userId]) {
    return alert("Sudah menerima!");
  }

  const user = userList.find(u => u.id === userId);
  lastNama = user.nama;

  const checkboxes = document.querySelectorAll("#komoditiList input:checked");
  if (checkboxes.length === 0) return alert("Pilih komoditi!");

  let komoditi = [];
  checkboxes.forEach(cb => komoditi.push(cb.value));

  let dataAwal = {};
  komoditi.forEach(k => dataAwal[k] = false);

  await setDoc(doc(db, "kupon", userId), dataAwal, { merge: true });

  lastQR = user.nama + "|" + komoditi.join(",");

  const qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";

  QRCode.toCanvas(lastQR, { width: 200 }, function (err, canvas) {
    qrDiv.appendChild(canvas);
  });
};

// ===== PRINT + LOCK SERVER =====
window.printQR = async function() {
  const canvas = document.querySelector("#qrcode canvas");
  if (!canvas) return alert("Generate QR dulu!");

  const userId = select.value;
  if (!userId) return alert("Pilih user dulu!");

  const komoditi = lastQR.split("|")[1].split(",");

  try {
    await runTransaction(db, async (transaction) => {
      const ref = doc(db, "kupon", userId);
      const snap = await transaction.get(ref);

      if (snap.exists()) {
        const data = snap.data();
        if (data.status === "selesai") throw "SUDAH";
      }

      let updateData = {
        status: "selesai",
        waktu: new Date().toISOString()
      };

      komoditi.forEach(k => updateData[k] = true);

      transaction.set(ref, updateData, { merge: true });
    });

    // PRINT
    const img = canvas.toDataURL();

    const win = window.open("", "_blank");
    win.document.write(`
      <html>
      <body style="text-align:center;font-family:monospace;font-size:12px;width:280px;">
        <h3>PASAR MURAH</h3>
        <hr>
        <div><b>${lastNama}</b></div>
        <img src="${img}" width="150">
        <hr>
        ${komoditi.map(k => `<div>- ${k}</div>`).join("")}
        <hr>
        <div>Terima Kasih</div>
        <script>
          window.onload = function(){
            window.print();
            setTimeout(()=>window.close(),500);
          }
        <\/script>
      </body>
      </html>
    `);

    win.document.close();

    select.value = "";

  } catch (e) {
    if (e === "SUDAH") {
      alert("❌ Sudah Menerima (Tidak bisa cetak ulang)");
    } else {
      alert("Error, coba lagi");
      console.error(e);
    }
  }
};
</script>

</body>
</html>
