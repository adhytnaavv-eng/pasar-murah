<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Pasar Murah - Petugas 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #eef2f7; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }
        .container { 
            background: #ffffff; 
            width: 100%; 
            max-width: 400px; 
            padding: 35px 25px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center;
        }
        h2 { color: #1a73e8; margin-bottom: 5px; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #3c4043; }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e8eaed; 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none;
            transition: all 0.3s;
            background-color: white;
        }
        input:focus, select:focus { border-color: #1a73e8; background-color: #f8fbff; }

        .error-hint { color: #d93025; font-size: 11px; margin-top: 5px; display: none; font-weight: 600; }

        button { 
            width: 100%; 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }
        button:active { transform: scale(0.97); }
        button:disabled { background-color: #bdc1c6; box-shadow: none; }

        .success-overlay {
            color: #188038;
            background: #e6f4ea;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Registrasi Warga</h2>
    <p>Input data penerima manfaat</p>

    <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Sesuai KTP" autocomplete="off">
    </div>

    <div class="input-group">
        <label>NIK (16 Digit)</label>
        <input type="text" id="kk" placeholder="16 digit angka" inputmode="numeric" maxlength="16" autocomplete="off">
        <div id="errorNik" class="error-hint">⚠️ Format NIK tidak sesuai</div>
    </div>

    <div class="input-group">
        <label>Lokasi Pelaksanaan</label>
        <select id="lokasi">
            <option value="">-- Pilih Lokasi --</option>
            <option value="TIM 1">TIM 1</option>
            <option value="TIM 2">TIM 2</option>
            <option value="TIM 3">TIM 3</option>
            <option value="TIM 4">TIM 4</option>
        </select>
    </div>

    <button id="btnSimpan" onclick="simpanData()">Simpan Data</button>
    
    <div id="successMsg" class="success-overlay">✅ Data Berhasil Disimpan!</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
        authDomain: "pasar-murah-kk.firebaseapp.com",
        projectId: "pasar-murah-kk",
        storageBucket: "pasar-murah-kk.firebasestorage.app",
        messagingSenderId: "964431531376",
        appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.simpanData = async function() {
        const btn = document.getElementById("btnSimpan");
        const nama = document.getElementById("nama").value.trim();
        const nik = document.getElementById("kk").value.trim();
        const lokasi = document.getElementById("lokasi").value;

        // Reset Error
        document.getElementById("errorNik").style.display = "none";

        // Validasi NIK
        const isNumeric = /^\d+$/.test(nik);
        if (!isNumeric || nik.length !== 16) {
            document.getElementById("errorNik").style.display = "block";
            return;
        }

        // Validasi Kelengkapan
        if (!nama || !lokasi) {
            alert("Nama dan Lokasi harus dipilih!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Memproses...";

        try {
            const docId = "ID-" + Date.now();

            await setDoc(doc(db, "registrasi", docId), {
                nama: nama,
                nik: nik,
                lokasi: lokasi,
                created_at: serverTimestamp()
            });

            document.getElementById("successMsg").style.display = "block";
            
            // Reset form
            document.getElementById("nama").value = "";
            document.getElementById("kk").value = "";
            document.getElementById("lokasi").value = "";
            
            setTimeout(() => { document.getElementById("successMsg").style.display = "none"; }, 3000);

        } catch (error) {
            alert("Terjadi kesalahan: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Simpan Data";
        }
    }

    // Hanya angka untuk NIK
    document.getElementById("kk").addEventListener("input", function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>

</body>
</html>
