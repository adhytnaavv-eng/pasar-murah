<!DOCTYPE html>

<html>
<head>
  <title>Registrasi Pasar Murah</title>
</head>
<body>

<h2>Form Registrasi</h2>

<input type="text" id="nama" placeholder="Nama"><br><br> <input type="text" id="kk" placeholder="No KK"><br><br>

<button onclick="simpanData()">Simpan</button>

<h3>QR Code:</h3>
<div id="qrcode"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
    storageBucket: "pasar-murah-kk.firebasestorage.app",
    messagingSenderId: "964431531376",
    appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.simpanData = async function() {
    try {
      const nama = document.getElementById("nama").value;
      const kk = document.getElementById("kk").value;

      const id = "PM" + Date.now();

      // Simpan data
      await setDoc(doc(db, "registrasi", id), {
        nama: nama,
        kk: kk,
        created_at: new Date()
      });

      await setDoc(doc(db, "kupon", id), {
        beras: false,
        minyak: false,
        telur: false,
        status: "belum"
      });

      // Generate QR
      const qrDiv = document.getElementById("qrcode");
      qrDiv.innerHTML = ""; // reset

      QRCode.toCanvas(id, { width: 200 }, function (error, canvas) {
        if (error) console.error(error);
        qrDiv.appendChild(canvas);
      });

      alert("Registrasi berhasil!");

    } catch (error) {
      alert("Error: " + error.message);
      console.error(error);
    }
  }
</script>

</body>
</html>
