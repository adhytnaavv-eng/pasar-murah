<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Distributor - Realisasi Petugas 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        /* Filter Bar */
        .filter-bar { 
            display: grid; 
            grid-template-columns: 1fr 1fr auto; 
            gap: 15px; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            align-items: end;
        }
        .f-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #666; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 14px; }
        
        .btn-check { 
            background: #1a73e8; color: white; border: none; padding: 0 30px; 
            border-radius: 8px; cursor: pointer; font-weight: 600; height: 46px; 
        }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1a73e8; color: white; padding: 15px; text-align: left; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        .qty { font-weight: bold; color: #28a745; background: #eefaf1; padding: 5px 12px; border-radius: 6px; }
        
        .loader { text-align: center; padding: 50px; display: none; color: #666; }
        .empty { text-align: center; padding: 40px; color: #999; border: 2px dashed #eee; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📊 Rekapitulasi Per Distributor</h2>
        
        <div class="filter-bar">
            <div class="f-group">
                <label>Pilih Hari/Tanggal</label>
                <input type="date" id="tglInput">
            </div>
            <div class="f-group">
                <label>Lokasi (Sesuai Input Registrasi)</label>
                <select id="lokasiSelect">
                    <option value="">-- Semua Lokasi --</option>
                </select>
            </div>
            <button class="btn-check" onclick="jalankanRekap()">Tampilkan Data</button>
        </div>

        <div id="loading" class="loader">Menghitung realisasi barang...</div>

        <div id="hasilTabel">
            <table id="tabelData" style="display:none;">
                <thead>
                    <tr id="headBaris">
                        <th>Nama Distributor</th>
                        </tr>
                </thead>
                <tbody id="bodyBaris"></tbody>
            </table>
            <div id="pesanKosong" class="empty">Silakan pilih tanggal dan klik Tampilkan.</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
        authDomain: "pasar-murah-kk.firebaseapp.com",
        projectId: "pasar-murah-kk",
        storageBucket: "pasar-murah-kk.firebasestorage.app",
        messagingSenderId: "964431531376",
        appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 1. SET UP DROPDOWN LOKASI SECARA DINAMIS ---
    async function setupFilter() {
        const regSnap = await getDocs(collection(db, "registrasi"));
        const lokSet = new Set();
        regSnap.forEach(d => { if(d.data().lokasi) lokSet.add(d.data().lokasi) });
        
        const sel = document.getElementById("lokasiSelect");
        lokSet.forEach(l => {
            const o = document.createElement("option");
            o.value = l; o.innerText = l;
            sel.appendChild(o);
        });

        // Set default tanggal hari ini
        document.getElementById("tglInput").valueAsDate = new Date();
    }

    // --- 2. FUNGSI HITUNG REKAP ---
    window.jalankanRekap = async function() {
        const tgl = document.getElementById("tglInput").value;
        const lok = document.getElementById("lokasiSelect").value;
        const loader = document.getElementById("loading");
        const tabel = document.getElementById("tabelData");
        const bBaris = document.getElementById("bodyBaris");
        const hBaris = document.getElementById("headBaris");

        if(!tgl) return alert("Pilih tanggal terlebih dahulu!");

        loader.style.display = "block";
        tabel.style.display = "none";
        document.getElementById("pesanKosong").style.display = "none";

        try {
            // A. Ambil List Distributor Resmi
            const distSnap = await getDocs(collection(db, "master_distributor"));
            let listDist = [];
            distSnap.forEach(d => listDist.push(d.data().nama || d.data().Nama));

            // B. Ambil List Komoditi (Header)
            const komSnap = await getDocs(collection(db, "master_komoditi"));
            let listKomo = [];
            hBaris.innerHTML = '<th>Nama Distributor</th>';
            komSnap.forEach(d => {
                const n = d.data().nama || d.data().Nama;
                listKomo.push(n);
                hBaris.innerHTML += `<th>${n}</th>`;
            });

            // C. Ambil Data Penyerahan (Kupon)
            const kuponSnap = await getDocs(collection(db, "kupon"));
            
            // Inisialisasi Objek Hitung: { "Bulog": { "Beras": 0 }, ... }
            let matrix = {};
            listDist.forEach(d => {
                matrix[d] = {};
                listKomo.forEach(k => matrix[d][k] = 0);
            });

            kuponSnap.forEach(doc => {
                const d = doc.data();
                
                // FILTER TANGGAL (YYYY-MM-DD)
                const tglData = d.waktu_cetak ? d.waktu_cetak.split("T")[0] : "";
                
                // FILTER LOKASI
                const matchLokasi = lok === "" || d.lokasi === lok;

                if (tglData === tgl && matchLokasi) {
                    // Cek tiap komoditi yang statusnya TRUE (Sudah diambil Petugas 3)
                    listKomo.forEach(k => {
                        if (d[k] === true) {
                            // Masukkan ke distributor yang sesuai
                            // Catatan: Pastikan di data 'kupon' tersimpan field 'distributor'
                            const namaDist = d.distributor || "Umum"; 
                            if (matrix[namaDist]) {
                                matrix[namaDist][k] += 1;
                            }
                        }
                    });
                }
            });

            // D. Render ke Tabel
            bBaris.innerHTML = "";
            listDist.forEach(dist => {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td><strong>${dist}</strong></td>`;
                listKomo.forEach(k => {
                    tr.innerHTML += `<td><span class="qty">${matrix[dist][k]}</span></td>`;
                });
                bBaris.appendChild(tr);
            });

            loader.style.display = "none";
            tabel.style.display = "table";

        } catch (e) {
            console.error(e);
            loader.innerText = "Error: " + e.message;
        }
    }

    setupFilter();
</script>
</body>
</html>
