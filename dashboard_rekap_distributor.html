<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Mobile</title>

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Style -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 15px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    label {
      font-size: 14px;
      color: #555;
    }

    input, select, button {
      width: 100%;
      height: 45px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 5px 10px;
      font-size: 14px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      font-weight: bold;
    }

    button:active {
      background: #45a049;
    }

    .result-item {
      background: #eef6ff;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .empty {
      text-align: center;
      color: #888;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📊 Dashboard</h2>

  <div class="card">
    <label>Dari Tanggal</label>
    <input type="date" id="startDate">

    <label>Sampai Tanggal</label>
    <input type="date" id="endDate">

    <button onclick="loadDistributorByDate()">Load Distributor</button>
  </div>

  <div class="card">
    <label>Pilih Distributor</label>
    <select id="distributorSelect">
      <option value="">-- Pilih --</option>
    </select>

    <button onclick="tampilkanData()">Tampilkan Data</button>
  </div>

  <div class="card">
    <h3>Hasil Distribusi</h3>
    <div id="hasil"></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let filteredData = [];

  window.loadDistributorByDate = async function() {
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;

    if (!startDate || !endDate) {
      alert("Pilih tanggal dulu!");
      return;
    }

    let start = new Date(startDate);
    let end = new Date(endDate);
    end.setHours(23,59,59,999);

    const snapshot = await getDocs(collection(db, "distribusi"));

    let distributorSet = new Set();
    filteredData = [];

    snapshot.forEach(doc => {
      const data = doc.data();
      let waktu = data.waktu?.toDate ? data.waktu.toDate() : new Date(data.waktu);

      if (waktu >= start && waktu <= end) {
        filteredData.push(data);
        distributorSet.add(data.distributor);
      }
    });

    const select = document.getElementById("distributorSelect");
    select.innerHTML = '<option value="">-- Pilih --</option>';

    distributorSet.forEach(nama => {
      const option = document.createElement("option");
      option.value = nama;
      option.text = nama;
      select.appendChild(option);
    });
  }

  window.tampilkanData = function() {
    const selected = document.getElementById("distributorSelect").value;
    const hasil = document.getElementById("hasil");
    hasil.innerHTML = "";

    if (!selected) {
      alert("Pilih distributor!");
      return;
    }

    let count = {};

    filteredData.forEach(data => {
      if (data.distributor === selected) {
        if (!count[data.komoditi]) count[data.komoditi] = 0;
        count[data.komoditi]++;
      }
    });

    if (Object.keys(count).length === 0) {
      hasil.innerHTML = "<div class='empty'>Tidak ada data</div>";
      return;
    }

    for (let item in count) {
      const div = document.createElement("div");
      div.className = "result-item";
      div.innerHTML = `<span>${item}</span><strong>${count[item]}</strong>`;
      hasil.appendChild(div);
    }
  }
</script>

</body>
</html>
