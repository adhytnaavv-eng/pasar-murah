<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Distribusi</title>
</head>
<body>

<h2>📊 Dashboard Distribusi</h2>

<h3>Pilih Rentang Tanggal</h3>
Dari: <input type="date" id="startDate">
Sampai: <input type="date" id="endDate">

<br><br>

<button onclick="loadDistributorByDate()">🔍 Load Distributor</button>

<br><br>

<h3>Pilih Distributor</h3>
<select id="distributorSelect">
  <option value="">-- Pilih Distributor --</option>
</select>

<br><br>

<button onclick="tampilkanData()">📊 Tampilkan</button>

<h3>Komoditi yang Disalurkan</h3>
<ul id="hasil"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    getDocs 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
    authDomain: "pasar-murah-kk.firebaseapp.com",
    projectId: "pasar-murah-kk",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let filteredData = [];

  // 🔥 LOAD DISTRIBUTOR BERDASARKAN TANGGAL
  window.loadDistributorByDate = async function() {
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;

    if (!startDate || !endDate) {
      alert("Pilih rentang tanggal dulu!");
      return;
    }

    let start = new Date(startDate);
    let end = new Date(endDate);
    end.setHours(23,59,59,999);

    const snapshot = await getDocs(collection(db, "distribusi"));

    let distributorSet = new Set();
    filteredData = [];

    snapshot.forEach(doc => {
      const data = doc.data();

      let waktu = data.waktu?.toDate ? data.waktu.toDate() : new Date(data.waktu);

      if (waktu >= start && waktu <= end) {
        filteredData.push(data);
        distributorSet.add(data.distributor);
      }
    });

    // isi dropdown distributor
    const select = document.getElementById("distributorSelect");
    select.innerHTML = '<option value="">-- Pilih Distributor --</option>';

    distributorSet.forEach(nama => {
      const option = document.createElement("option");
      option.value = nama;
      option.text = nama;
      select.appendChild(option);
    });

    if (distributorSet.size === 0) {
      alert("Tidak ada distributor di tanggal tersebut");
    }
  }

  // 🔥 TAMPILKAN DATA KOMODITI
  window.tampilkanData = function() {
    const selectedDistributor = document.getElementById("distributorSelect").value;

    const hasil = document.getElementById("hasil");
    hasil.innerHTML = "";

    if (!selectedDistributor) {
      alert("Pilih distributor!");
      return;
    }

    let komoditiCount = {};

    filteredData.forEach(data => {
      if (data.distributor === selectedDistributor) {

        if (!komoditiCount[data.komoditi]) {
          komoditiCount[data.komoditi] = 0;
        }

        komoditiCount[data.komoditi]++;
      }
    });

    if (Object.keys(komoditiCount).length === 0) {
      hasil.innerHTML = "<li>Tidak ada data</li>";
      return;
    }

    for (let item in komoditiCount) {
      const li = document.createElement("li");
      li.innerText = item + " : " + komoditiCount[item];
      hasil.appendChild(li);
    }
  }

</script>

</body>
</html>
