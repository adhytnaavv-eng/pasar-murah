<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Realisasi Penyerahan - Petugas 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h2 { color: #202124; margin: 0; font-size: 22px; }
        
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: #34a853; color: white; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; font-size: 15px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f9fffb; }
        
        .count-badge { 
            display: inline-block; padding: 6px 12px; border-radius: 8px; 
            font-weight: 600; background: #e6f4ea; color: #1e8e3e; border: 1px solid #ceead6;
        }
        
        .btn-refresh { 
            background: #34a853; color: white; border: none; padding: 12px 24px; 
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn-refresh:hover { background: #2d8e47; box-shadow: 0 4px 12px rgba(52, 168, 83, 0.3); }

        .summary-info { margin-top: 15px; font-size: 13px; color: #5f6368; }
        .loader { text-align: center; padding: 40px; color: #5f6368; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>✅ Rekap Realisasi Penyerahan Barang</h2>
        <button class="btn-refresh" onclick="muatDataRealisasi()">🔄 Update Dashboard</button>
    </div>

    <div class="card">
        <div id="loading" class="loader">Sedang mensinkronisasi data penyerahan...</div>
        
        <table id="mainTable" style="display:none;">
            <thead>
                <tr id="tableHead">
                    <th>Lokasi / Distributor</th>
                    </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
        
        <div id="infoUpdate" class="summary-info"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhp4jf51PB0t8Auh9S3FGFiAgJ7CJnDYs",
        authDomain: "pasar-murah-kk.firebaseapp.com",
        projectId: "pasar-murah-kk",
        storageBucket: "pasar-murah-kk.firebasestorage.app",
        messagingSenderId: "964431531376",
        appId: "1:964431531376:web:c6b30579b3a41fb91293b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.muatDataRealisasi = async function() {
        const loader = document.getElementById("loading");
        const table = document.getElementById("mainTable");
        const tHead = document.getElementById("tableHead");
        const tBody = document.getElementById("tableBody");
        const info = document.getElementById("infoUpdate");

        loader.style.display = "block";
        table.style.display = "none";

        try {
            // 1. Ambil list komoditi aktif
            const komoditiSnap = await getDocs(collection(db, "master_komoditi"));
            let listBarang = [];
            tHead.innerHTML = '<th>Lokasi / Distributor</th>';
            
            komoditiSnap.forEach(doc => {
                const b = doc.data().nama || doc.data().Nama;
                listBarang.push(b);
                const th = document.createElement("th");
                th.innerText = b;
                tHead.appendChild(th);
            });

            // 2. Ambil data kupon yang sudah diproses (status_cetak: true)
            const kuponSnap = await getDocs(collection(db, "kupon"));
            
            let rekap = {}; // Struktur: { "Lokasi A": { "Beras": 5, "Minyak": 2 } }

            kuponSnap.forEach(doc => {
                const d = doc.data();
                const lokasi = d.lokasi || d.distributor || "Pusat";

                if (!rekap[lokasi]) {
                    rekap[lokasi] = {};
                    listBarang.forEach(b => rekap[lokasi][b] = 0);
                }

                // LOGIKA UTAMA: Hanya hitung jika nilainya TRUE (Sudah diserahkan Petugas 3)
                listBarang.forEach(b => {
                    if (d[b] === true) {
                        rekap[lokasi][b] += 1;
                    }
                });
            });

            // 3. Render Tabel
            tBody.innerHTML = "";
            let totalSemua = 0;

            for (const [loc, items] of Object.entries(rekap)) {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td><strong>${loc}</strong></td>`;
                
                listBarang.forEach(b => {
                    const jml = items[b];
                    totalSemua += jml;
                    tr.innerHTML += `<td><div class="count-badge">${jml}</div></td>`;
                });
                tBody.appendChild(tr);
            }

            loader.style.display = "none";
            table.style.display = "table";
            info.innerHTML = `Terakhir diperbarui: ${new Date().toLocaleTimeString('id-ID')} | Total Penyerahan: <strong>${totalSemua} Item</strong>`;

        } catch (err) {
            loader.innerText = "Terjadi kesalahan koneksi database.";
            console.error(err);
        }
    }

    // Jalankan otomatis
    muatDataRealisasi();
</script>
</body>
</html>
